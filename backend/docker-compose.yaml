services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: uaams-backend:local
    container_name: uaams-backend
    env_file:
      - .env
    environment:
      PG_HOST: host.docker.internal
      MONGODB_URI: mongodb://host.docker.internal:27017/uaams
      REDIS_URL: redis://host.docker.internal:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-5000}:5000"
    restart: unless-stopped
