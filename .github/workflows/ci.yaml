name: Backend CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build-and-push:
    name: Build and push backend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Check Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "::error::DOCKERHUB_USERNAME is empty or unavailable to this workflow."
            exit 1
          fi

          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::DOCKERHUB_TOKEN is empty or unavailable to this workflow."
            exit 1
          fi

          echo "::add-mask::$DOCKERHUB_USERNAME"
          echo "DOCKERHUB_USERNAME is available: $DOCKERHUB_USERNAME"
          echo "DOCKERHUB_TOKEN is available."

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/uaams:latest ./backend

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/uaams:latest
